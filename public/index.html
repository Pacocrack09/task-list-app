<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="#">
          <i class="bi bi-check2-square me-2"></i>TaskFlow
        </a>
      </div>
    </nav>

    <div class="container" style="max-width: 680px">
      <!-- add task form -->
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="card-title mb-3">Add a new task</h5>
          <form id="taskForm" class="d-flex gap-2">
            <input
              type="text"
              id="taskInput"
              class="form-control"
              placeholder="What do you need to do?"
              required
            />
            <button type="submit" class="btn btn-primary text-nowrap">
              <i class="bi bi-plus-lg me-1"></i>Add
            </button>
          </form>
        </div>
      </div>

      <!-- counter -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">My Tasks</h5>
        <span id="taskCount" class="text-muted small"></span>
      </div>

      <!-- task list -->
      <ul id="taskList" class="list-group mb-5"></ul>

      <!-- empty state -->
      <p id="emptyMsg" class="text-center text-muted d-none">
        No tasks yet. Add one above!
      </p>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
